<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cavalla RTC</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      padding: 32px;
      background: #f6f6f6;
      color: #111;
    }

    h1 {
      margin: 0 0 32px;
      font-size: 24px;
      line-height: 1.4;
    }

    .lane {
      display: flex;
      justify-content: space-between;
      gap: 24px;
    }

    .box {
      flex: 1;
      min-height: 240px;
      border: 2px solid #222;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      text-transform: lowercase;
      position: relative;
      overflow: hidden;
    }

    .box-label {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: rgba(255, 255, 255, 0.82);
      padding: 6px 8px;
      border: 1px solid #222;
    }

    .camera-feed {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #111;
    }

    .camera-status {
      padding: 24px;
      text-align: center;
      font-size: 18px;
      line-height: 1.5;
      text-transform: none;
    }

    .operator-box {
      align-items: stretch;
      justify-content: stretch;
      padding: 20px;
    }

    .inner-box {
      border: 2px solid #222;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      text-transform: lowercase;
      background: #fff;
    }
  </style>
</head>
<body>
  <h1>project: service that streams video from fork lifts to remote operators. the remote operations should be able to view video, and send commands back to the fork lift.</h1>
  <div class="lane">
    <div class="box">
      <div class="box-label">forklift</div>
      <video id="forklift-camera" class="camera-feed" autoplay muted playsinline></video>
      <div id="camera-status" class="camera-status">requesting webcam access...</div>
    </div>
    <div class="box operator-box">
      <div class="box-label">operator</div>
      <div class="inner-box">
        <video id="operator-video" class="camera-feed" autoplay playsinline></video>
        <div id="operator-status" class="camera-status">waiting for forklift video...</div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
  <script>
    const forkliftCamera = document.getElementById('forklift-camera');
    const forkliftStatus = document.getElementById('camera-status');
    const operatorVideo = document.getElementById('operator-video');
    const operatorStatus = document.getElementById('operator-status');

    async function getToken({ identity, name, canPublish, canSubscribe, room }) {
      const params = new URLSearchParams({
        identity,
        name,
        room,
        canPublish: String(canPublish),
        canSubscribe: String(canSubscribe),
      });
      const response = await fetch(`/cavalla-rtc/token?${params.toString()}`);
      const body = await response.json();
      if (!response.ok) {
        const reason = body?.error || 'failed to fetch livekit token';
        throw new Error(reason);
      }
      return body;
    }

    async function startLiveKitStream() {
      if (!navigator.mediaDevices?.getUserMedia) {
        forkliftStatus.textContent = 'this browser does not support webcam streaming.';
        return;
      }

      if (!window.LivekitClient?.Room) {
        forkliftStatus.textContent = 'livekit sdk failed to load.';
        return;
      }

      const roomName = 'cavalla-forklift-operator';
      const forkliftRoom = new window.LivekitClient.Room();
      const operatorRoom = new window.LivekitClient.Room();

      try {
        const [forkliftAuth, operatorAuth] = await Promise.all([
          getToken({
            identity: 'forklift-webcam',
            name: 'Forklift Webcam',
            room: roomName,
            canPublish: true,
            canSubscribe: false,
          }),
          getToken({
            identity: 'operator-video',
            name: 'Operator Video',
            room: roomName,
            canPublish: false,
            canSubscribe: true,
          }),
        ]);

        await Promise.all([
          forkliftRoom.connect(forkliftAuth.url, forkliftAuth.token),
          operatorRoom.connect(operatorAuth.url, operatorAuth.token),
        ]);

        operatorRoom.on(window.LivekitClient.RoomEvent.TrackSubscribed, (track, publication) => {
          if (publication.kind !== window.LivekitClient.Track.Kind.Video) {
            return;
          }
          track.attach(operatorVideo);
          operatorStatus.hidden = true;
        });

        const videoTrack = await window.LivekitClient.createLocalVideoTrack();
        videoTrack.attach(forkliftCamera);
        forkliftStatus.hidden = true;
        await forkliftRoom.localParticipant.publishTrack(videoTrack);
      } catch (error) {
        forkliftStatus.textContent = 'unable to stream webcam to operator. check livekit env vars and camera permissions.';
        operatorStatus.textContent = 'operator video is offline.';
        console.error('Unable to start LiveKit stream:', error);
      }
    }

    startLiveKitStream();
  </script>
</body>
</html>
