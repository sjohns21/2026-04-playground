<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Image Gen · FLUX</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #030308;
      --border: rgba(200,150,255,0.18);
      --purple: #c77dff;
      --cyan: #90e0ef;
      --text: #ddd0ff;
      --muted: rgba(200,180,255,0.45);
      --surface: rgba(255,255,255,0.04);
    }
    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #07071a 0%, #030308 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 40px;
    }
    h1 {
      font-size: clamp(1.1rem, 4vw, 1.5rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--purple), var(--cyan), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
      text-align: center;
    }
    .subtitle {
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 32px;
      text-align: center;
    }
    .wrap {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .input-row {
      display: flex;
      gap: 10px;
    }
    textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 0.9rem;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    textarea::placeholder { color: var(--muted); }
    textarea:focus { border-color: rgba(199,125,255,0.5); }
    button {
      background: linear-gradient(135deg, rgba(150,80,255,0.25), rgba(80,40,180,0.25));
      border: 1px solid rgba(200,150,255,0.4);
      border-radius: 14px;
      padding: 12px 20px;
      color: var(--text);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.2s;
      white-space: nowrap;
      align-self: flex-start;
    }
    button:hover { border-color: rgba(200,150,255,0.7); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .image-wrap {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
    }
    .image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    .image-wrap img.visible { display: block; }
    .status {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      min-height: 1em;
    }
  </style>
</head>
<body>
  <h1>✦ Image Gen ✦</h1>
  <p class="subtitle">FLUX.1 Schnell · via Fal</p>

  <div class="wrap">
    <div class="image-wrap" id="image-wrap">
      <span id="placeholder">Your image will appear here</span>
      <img id="result-img" alt="Generated image" />
    </div>
    <p class="status" id="status"></p>
    <div class="input-row">
      <textarea id="prompt" rows="3" placeholder="Describe an image…"></textarea>
      <button id="generate-btn" onclick="generate()">Generate</button>
    </div>
  </div>

  <script>
    const promptEl = document.getElementById('prompt');
    const btn = document.getElementById('generate-btn');
    const img = document.getElementById('result-img');
    const placeholder = document.getElementById('placeholder');
    const status = document.getElementById('status');

    async function generate() {
      const prompt = promptEl.value.trim();
      if (!prompt) return;

      btn.disabled = true;
      status.textContent = 'Generating…';
      img.classList.remove('visible');
      placeholder.style.display = 'flex';

      try {
        const res = await fetch('/image-gen-api', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });
        const data = await res.json();
        if (data.error) { status.textContent = data.error; return; }
        img.src = data.url;
        img.onload = () => {
          placeholder.style.display = 'none';
          img.classList.add('visible');
          status.textContent = '';
        };
      } catch (e) {
        status.textContent = 'Error — try again.';
      } finally {
        btn.disabled = false;
      }
    }

    promptEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); generate(); }
    });
  </script>
</body>
</html>
