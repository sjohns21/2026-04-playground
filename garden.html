<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Mohana's Garden</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: linear-gradient(160deg, #07071a 0%, #030308 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #ddd0ff;
      padding: 24px 16px;
      overflow-x: hidden;
    }
    .title-wrap { text-align: center; margin-bottom: 24px; }
    h1 {
      font-size: clamp(1.1rem, 5vw, 1.6rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      background: linear-gradient(90deg, #c77dff, #90e0ef, #c77dff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle { font-size: 0.68rem; letter-spacing: 0.22em; opacity: 0.4; margin-top: 6px; text-transform: uppercase; }
    .canvas-wrap { position: relative; margin-bottom: 24px; transition: transform 0.3s ease; }
    .canvas-wrap.blooming { transform: scale(0.96); }
    canvas {
      display: block;
      border-radius: 50%;
      width: min(88vw, 480px);
      height: min(88vw, 480px);
      box-shadow: 0 0 60px rgba(150,80,255,0.35), 0 0 120px rgba(80,40,180,0.2);
    }
    .ring-border { position: absolute; inset: -2px; border-radius: 50%; border: 1px solid rgba(200,150,255,0.2); pointer-events: none; }
    .controls { width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 12px; }
    input[type="text"] {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(200,150,255,0.25); border-radius: 14px;
      padding: 13px 18px; color: #ddd0ff; font-size: 0.9rem;
      outline: none; letter-spacing: 0.02em; transition: border-color 0.2s; font-family: inherit;
    }
    input[type="text"]::placeholder { color: rgba(200,180,255,0.35); }
    input[type="text"]:focus { border-color: rgba(200,150,255,0.6); }
    button {
      background: linear-gradient(135deg, rgba(150,80,255,0.25), rgba(80,40,180,0.25));
      border: 1px solid rgba(200,150,255,0.4); border-radius: 14px;
      padding: 14px; color: #e8d8ff; font-size: 0.95rem; cursor: pointer;
      letter-spacing: 0.12em; text-transform: uppercase; font-family: inherit; font-weight: 400;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { transform: scale(0.97); }
    .seed-display { display: flex; justify-content: center; gap: 8px; font-size: 0.62rem; opacity: 0.3; letter-spacing: 0.12em; font-family: monospace; }
    .nav-link {
      display: block; text-align: center; text-decoration: none;
      background: linear-gradient(135deg, rgba(150,80,255,0.12), rgba(80,40,180,0.12));
      border: 1px solid rgba(200,150,255,0.28); border-radius: 14px;
      padding: 12px; color: rgba(220,210,255,0.7); font-size: 0.78rem;
      letter-spacing: 0.14em; text-transform: uppercase; font-family: inherit;
      transition: all 0.2s; -webkit-tap-highlight-color: transparent;
    }
    .nav-link:hover { border-color: rgba(200,150,255,0.55); color: #e8d8ff; background: linear-gradient(135deg, rgba(150,80,255,0.2), rgba(80,40,180,0.2)); }
  </style>
</head>
<body>
  <div class="title-wrap">
    <h1>✦ MOHANA'S GARDEN ✦</h1>
    <p class="subtitle">digital bloom generator</p>
  </div>
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="flowerCanvas" width="520" height="520"></canvas>
    <div class="ring-border"></div>
  </div>
  <div class="controls">
    <input type="text" id="promptInput" placeholder="Describe your bloom… blue, rose, cosmic, fire…" />
    <button id="bloomBtn">🌸   New Bloom</button>
    <div class="seed-display"><span>SEED</span><span id="seedDisplay">—</span></div>
    <a class="nav-link" href="auth.html">✦ &nbsp; Auth Explorer</a>
    <a class="nav-link" href="resume.html">✦ &nbsp; Resume</a>
  </div>
<script>
function makePRNG(seed) {
  return function() {
    seed |= 0; seed = (seed + 0x6d2b79f5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function hashStr(s) {
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = ((h << 5) + h + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}
function derivePalette(prompt, rng) {
  const p = prompt.toLowerCase();
  if (/blue|ocean|sky|water|aqua|teal/.test(p))     return ['#0066FF','#00AAFF','#0033CC','#66BBFF','#003399'];
  if (/red|fire|flame|lava|hot/.test(p))             return ['#FF0000','#FF3300','#CC0000','#FF6600','#990000'];
  if (/green|forest|nature|leaf|jungle/.test(p))     return ['#00CC00','#009900','#33FF33','#006600','#66FF66'];
  if (/purple|violet|cosmic|galaxy|magic/.test(p))   return ['#9900FF','#6600CC','#CC00FF','#7700AA','#BB44FF'];
  if (/pink|rose|love|blossom|cherry/.test(p))       return ['#FF00AA','#FF44BB','#CC0077','#FF77CC','#990055'];
  if (/gold|yellow|sun|sunny|bright/.test(p))        return ['#FFD700','#FFAA00','#FF8800','#FFE44D','#CC8800'];
  if (/white|ice|frost|snow|crystal/.test(p))        return ['#EEEEFF','#DDDDFF','#CCCCFF','#FFFFFF','#AAAADD'];
  if (/dark|night|shadow|void|black/.test(p))        return ['#330066','#440088','#551199','#6622AA','#7733BB'];
  if (/sunset|warm|amber|orange/.test(p))            return ['#FF4E1A','#FF9A3C','#FFD460','#FF6B6B','#FFA07A'];
  const h = rng() * 360;
  return [
    `hsl(${h},80%,60%)`, `hsl(${(h+35)%360},70%,70%)`,
    `hsl(${(h+70)%360},90%,55%)`, `hsl(${(h-35+360)%360},65%,45%)`,
    `hsl(${(h+180)%360},75%,65%)`
  ];
}
function rgba(color, a) {
  if (color.startsWith('#')) {
    const r = parseInt(color.slice(1,3),16);
    const g = parseInt(color.slice(3,5),16);
    const b = parseInt(color.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }
  if (color.startsWith('hsl(')) {
    return 'hsla(' + color.slice(4, -1) + ',' + a + ')';
  }
  return color;
}

let sporeData = [];

function buildFlower(seedVal, promptText) {
  const combined = (seedVal ^ hashStr(promptText || '')) >>> 0;
  // Use a separate rng for spores so it doesn't interfere with petal generation
  const sporeRng = makePRNG((combined ^ 0xA3C5E7F1) >>> 0);
  const canvas = document.getElementById('flowerCanvas');
  const maxR = Math.min(canvas.width, canvas.height) * 0.38;
  sporeData = [];
  for (let i = 0; i < 80; i++) {
    sporeData.push({
      radius:     maxR * (0.25 + sporeRng() * 0.85),
      baseAngle:  sporeRng() * Math.PI * 2,
      speed:      (sporeRng() - 0.5) * 0.18,
      colorIndex: Math.floor(sporeRng() * 5),
      alpha:      sporeRng() * 0.6 + 0.05,
      size:       sporeRng() * 2.2 + 0.3,
    });
  }
}

function drawFlower(canvas, seedVal, promptText, t) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height, cx = W/2, cy = H/2;
  const combined = (seedVal ^ hashStr(promptText || '')) >>> 0;
  const rng = makePRNG(combined);
  ctx.clearRect(0, 0, W, H);
  const bg = ctx.createRadialGradient(cx,cy,0,cx,cy,Math.hypot(W,H)*0.6);
  bg.addColorStop(0,'#0d0d1a'); bg.addColorStop(1,'#030308');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
  const palette = derivePalette(promptText || '', rng);
  const maxR = Math.min(W,H)*0.38;
  // halo
  const halo = ctx.createRadialGradient(cx,cy,0,cx,cy,maxR*1.3);
  halo.addColorStop(0, rgba(palette[0],0.25));
  halo.addColorStop(0.5, rgba(palette[2],0.1));
  halo.addColorStop(1,'transparent');
  ctx.globalCompositeOperation='screen'; ctx.fillStyle=halo; ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='source-over';
  // petal layers
  const numLayers = 3 + Math.floor(rng()*3);
  const globalRot = rng()*Math.PI*2;
  for (let layer = numLayers-1; layer >= 0; layer--) {
    const numPetals = 5 + Math.floor(rng()*9);
    const petalLenBase = maxR*(0.95-(layer/(numLayers-1))*0.5)*(0.6+rng()*0.4);
    const petalLen = petalLenBase * (1 + 0.06 * Math.sin(t * 1.2 + layer * 0.8));
    const petalW = petalLen*(0.15+rng()*0.35);
    const layerRot = globalRot + (rng()-0.5)*0.4 + (layer*Math.PI/numLayers) + t * (0.08 + layer * 0.03);
    const c1 = palette[layer%palette.length];
    const c2 = palette[(layer+2)%palette.length];
    for (let i = 0; i < numPetals; i++) {
      const angle = layerRot+(i/numPetals)*Math.PI*2;
      ctx.save(); ctx.translate(cx,cy); ctx.rotate(angle);
      const grad = ctx.createLinearGradient(0,0,petalLen,0);
      grad.addColorStop(0, rgba(c1,0.9));
      grad.addColorStop(0.4, rgba(c2,0.7));
      grad.addColorStop(1, rgba(c1,0.05));
      ctx.globalAlpha = 0.7+rng()*0.3;
      ctx.globalCompositeOperation = layer===numLayers-1?'lighter':'screen';
      const bulge = 0.6+rng()*0.4;
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.bezierCurveTo(petalLen*0.25,petalW*bulge,petalLen*0.7,petalW*0.6,petalLen,0);
      ctx.bezierCurveTo(petalLen*0.7,-petalW*0.6,petalLen*0.25,-petalW*bulge,0,0);
      ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
      ctx.globalAlpha=0.15; ctx.strokeStyle=rgba(c2,1); ctx.lineWidth=0.8;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(petalLen*0.5,petalW*0.1,petalLen*0.95,0); ctx.stroke();
      ctx.restore();
    }
  }
  // stamen
  ctx.save(); ctx.translate(cx,cy);
  const goldenAngle = Math.PI*(3-Math.sqrt(5));
  const stamR = maxR*0.18;
  const numDots = 120+Math.floor(rng()*80);
  for (let i = 0; i < numDots; i++) {
    const frac = i/numDots;
    const r = Math.sqrt(frac)*stamR;
    const theta = i*goldenAngle;
    ctx.globalAlpha = (0.75 + frac*0.25) * (0.7 + 0.3 * Math.sin(t * 3 + i * 0.4));
    ctx.globalCompositeOperation='screen';
    ctx.fillStyle=palette[i%palette.length];
    ctx.beginPath(); ctx.arc(r*Math.cos(theta),r*Math.sin(theta),((1-frac)*3.5+0.5),0,Math.PI*2); ctx.fill();
  }
  // center glow
  const glowR = stamR * 0.8 * (1 + 0.1 * Math.sin(t * 2));
  const cg = ctx.createRadialGradient(0,0,0,0,0,glowR);
  cg.addColorStop(0,'rgba(255,255,255,0.95)');
  cg.addColorStop(0.25,rgba(palette[0],0.7));
  cg.addColorStop(0.7,rgba(palette[1],0.3));
  cg.addColorStop(1,'transparent');
  ctx.globalAlpha=1; ctx.globalCompositeOperation='screen';
  ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(0,0,glowR,0,Math.PI*2); ctx.fill();
  ctx.restore();
  // drifting spores
  ctx.globalCompositeOperation='screen';
  for (let i = 0; i < sporeData.length; i++) {
    const s = sporeData[i];
    const theta = s.baseAngle + t * s.speed;
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = palette[s.colorIndex % palette.length];
    ctx.beginPath();
    ctx.arc(cx + s.radius*Math.cos(theta), cy + s.radius*Math.sin(theta), s.size, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
}

const canvas = document.getElementById('flowerCanvas');
const promptInput = document.getElementById('promptInput');
const bloomBtn = document.getElementById('bloomBtn');
const seedDisplay = document.getElementById('seedDisplay');
const canvasWrap = document.getElementById('canvasWrap');
let currentSeed = Date.now();

buildFlower(currentSeed, promptInput.value);
seedDisplay.textContent = currentSeed;

function animate() {
  requestAnimationFrame(animate);
  const t = performance.now() / 1000;
  drawFlower(canvas, currentSeed, promptInput.value, t);
}

bloomBtn.addEventListener('click', () => {
  currentSeed = Date.now();
  seedDisplay.textContent = currentSeed;
  buildFlower(currentSeed, promptInput.value);
  canvasWrap.classList.add('blooming');
  setTimeout(() => canvasWrap.classList.remove('blooming'), 400);
});

['input','change','keyup'].forEach(ev => promptInput.addEventListener(ev, () => {
  buildFlower(currentSeed, promptInput.value);
}));

animate();

// Auto-refresh for mobile dev (polls every 2s, reloads if file changes)
// Pauses while user is actively typing to avoid clearing the input mid-keystroke
(function() {
  var last = '';
  var lastTyped = 0;
  var inp = document.getElementById('promptInput');
  inp.addEventListener('focus', function() { lastTyped = Date.now(); });
  inp.addEventListener('input', function() { lastTyped = Date.now(); });
  setInterval(function() {
    if (Date.now() - lastTyped < 3000) return;
    fetch(location.href, {cache:'no-store'})
      .then(r => r.text())
      .then(html => { if (last && html !== last) location.reload(); last = html; })
      .catch(function(){});
  }, 2000);
})();
</script>
</body>
</html>
