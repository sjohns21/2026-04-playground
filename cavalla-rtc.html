<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cavalla RTC</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      padding: 32px;
      background: #f6f6f6;
      color: #111;
    }

    h1 {
      margin: 0 0 32px;
      font-size: 24px;
      line-height: 1.4;
    }

    .lane {
      display: flex;
      justify-content: space-between;
      gap: 24px;
    }

    .box {
      flex: 1;
      min-height: 240px;
      border: 2px solid #222;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      text-transform: lowercase;
    }
  </style>
</head>
<body>
  <h1>project: service that streams video from fork lifts to remote operators. the remote operations should be able to view video, and send commands back to the fork lift.</h1>
  <div class="lane">
    <div class="box">forklift</div>
    <div class="box">operator</div>
  </div>
</body>
</html>
