services:
  - type: web
    name: playground-app
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: ENABLE_LOCAL_INFERENCE
        value: "false"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: INSFORGE_BASE_URL
        sync: false
      - key: INSFORGE_ANON_KEY
        sync: false
      - key: INSFORGE_API_KEY
        sync: false
      - key: INSFORGE_DEMO_TABLE
        sync: false
      - key: INSFORGE_AI_MODEL
        sync: false
      - key: INSFORGE_PROJECT_ID
        sync: false
