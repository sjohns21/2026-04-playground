<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Chat · Llama 3.2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #030308;
      --border: rgba(200,150,255,0.18);
      --purple: #c77dff;
      --cyan: #90e0ef;
      --text: #ddd0ff;
      --muted: rgba(200,180,255,0.45);
      --surface: rgba(255,255,255,0.04);
    }
    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #07071a 0%, #030308 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 24px;
    }
    h1 {
      font-size: clamp(1.1rem, 4vw, 1.5rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--purple), var(--cyan), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
      text-align: center;
    }
    .subtitle {
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 32px;
      text-align: center;
    }
    .chat-wrap {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1;
    }
    .messages {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 300px;
    }
    .msg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 85%;
    }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }
    .msg-label {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .msg-bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 0.9rem;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .msg.user .msg-bubble {
      background: rgba(199,125,255,0.15);
      border: 1px solid rgba(199,125,255,0.3);
    }
    .msg.assistant .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .typing .msg-bubble { opacity: 0.5; font-style: italic; }
    .input-row {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }
    textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 0.9rem;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      transition: border-color 0.2s;
      rows: 1;
    }
    textarea::placeholder { color: var(--muted); }
    textarea:focus { border-color: rgba(199,125,255,0.5); }
    button {
      background: linear-gradient(135deg, rgba(150,80,255,0.25), rgba(80,40,180,0.25));
      border: 1px solid rgba(200,150,255,0.4);
      border-radius: 14px;
      padding: 12px 20px;
      color: var(--text);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.2s;
      white-space: nowrap;
    }
    button:hover { border-color: rgba(200,150,255,0.7); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>✦ Chat ✦</h1>
  <p class="subtitle">Llama 3.2 · via Groq</p>

  <div class="chat-wrap">
    <div class="messages" id="messages"></div>
    <div class="input-row">
      <textarea id="input" placeholder="Say something…" rows="2"></textarea>
      <button id="send-btn" onclick="send()">Send</button>
    </div>
  </div>

  <script>
    const messages = [];
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');

    function renderMessages() {
      messagesEl.innerHTML = '';
      messages.forEach(m => {
        const div = document.createElement('div');
        div.className = `msg ${m.role}`;
        div.innerHTML = `
          <div class="msg-label">${m.role === 'user' ? 'You' : 'Llama 3.2'}</div>
          <div class="msg-bubble">${m.content.replace(/</g, '&lt;')}</div>
        `;
        messagesEl.appendChild(div);
      });
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text) return;

      messages.push({ role: 'user', content: text });
      inputEl.value = '';
      sendBtn.disabled = true;
      renderMessages();

      // Typing indicator
      const typing = document.createElement('div');
      typing.className = 'msg assistant typing';
      typing.innerHTML = '<div class="msg-label">Llama 3.2</div><div class="msg-bubble">Thinking…</div>';
      messagesEl.appendChild(typing);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      try {
        const res = await fetch('/chat-api', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages })
        });
        const data = await res.json();
        typing.remove();
        messages.push({ role: 'assistant', content: data.content });
        renderMessages();
      } catch (e) {
        typing.remove();
        messages.push({ role: 'assistant', content: 'Error: could not reach the server.' });
        renderMessages();
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
  </script>
</body>
</html>
