<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cavalla RTC</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      padding: 32px;
      background: #f6f6f6;
      color: #111;
    }

    h1 {
      margin: 0 0 32px;
      font-size: 24px;
      line-height: 1.4;
    }

    .lane {
      display: flex;
      justify-content: space-between;
      gap: 24px;
    }

    .box {
      flex: 1;
      min-height: 240px;
      border: 2px solid #222;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      text-transform: lowercase;
      position: relative;
      overflow: hidden;
    }

    .box-label {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: rgba(255, 255, 255, 0.82);
      padding: 6px 8px;
      border: 1px solid #222;
    }

    .camera-feed {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #111;
    }

    .camera-status {
      padding: 24px;
      text-align: center;
      font-size: 18px;
      line-height: 1.5;
      text-transform: none;
    }

    .operator-box {
      align-items: stretch;
      justify-content: stretch;
      padding: 20px;
    }

    .inner-box {
      border: 2px solid #222;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      text-transform: lowercase;
      background: #fff;
    }
  </style>
</head>
<body>
  <h1>project: service that streams video from fork lifts to remote operators. the remote operations should be able to view video, and send commands back to the fork lift.</h1>
  <div class="lane">
    <div class="box">
      <div class="box-label">forklift</div>
      <video id="forklift-camera" class="camera-feed" autoplay muted playsinline></video>
      <div id="camera-status" class="camera-status">requesting webcam access...</div>
    </div>
    <div class="box operator-box">
      <div class="box-label">operator</div>
      <div class="inner-box">video</div>
    </div>
  </div>
  <script>
    const camera = document.getElementById('forklift-camera');
    const status = document.getElementById('camera-status');

    async function startForkliftCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: false,
        });

        camera.srcObject = stream;
        status.hidden = true;
      } catch (error) {
        status.textContent = 'webcam unavailable. allow camera access to stream the forklift view.';
        console.error('Unable to start webcam stream:', error);
      }
    }

    if (!navigator.mediaDevices?.getUserMedia) {
      status.textContent = 'this browser does not support webcam streaming.';
    } else {
      startForkliftCamera();
    }
  </script>
</body>
</html>
